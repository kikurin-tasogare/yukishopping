<!DOCTYPE html>
<!-- ntfy 通知テスト用コメント（削除してOK） -->
<!-- 通知フック再テスト 2026-04-12 -->
<!-- カーくん追記コメント -->

<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4db6c8" />
  <title>やりたいことリスト（音声）</title>
  <style>
    :root {
      --bg: #f4f6f4;
      --surface: #fff;
      --text: #1c1c1c;
      --muted: #5c6b63;
      --accent: #4db6c8;
      --accent-dark: #3a9fb3;
      --accent-soft: #e8f4f7;
      --done: #94a399;
      --danger: #c45c4a;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(77, 182, 200, 0.12);
      --btn-shadow: 0 2px 14px rgba(77, 182, 200, 0.35);
      --tap: 48px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      max-width: 480px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }

    .voice-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }


    .voice-btn {
      width: min(100%, 280px);
      min-height: var(--tap);
      padding: 18px 24px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--btn-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      touch-action: manipulation;
    }

    .voice-btn:active {
      transform: scale(0.98);
      background: var(--accent-dark);
    }

    .voice-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .voice-btn.listening {
      background: var(--danger);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .voice-btn.voice-btn-with-caption {
      justify-content: flex-start;
      padding-left: 22px;
      gap: 12px;
    }

    .voice-btn-with-caption .voice-btn-textcol {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 3px;
      text-align: left;
    }

    .voice-btn-with-caption .voice-btn-caption {
      font-size: 0.72rem;
      font-weight: 600;
      opacity: 0.88;
      letter-spacing: 0.02em;
    }

    .voice-btn-title-line {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .voice-wrap-place-top {
      margin-bottom: 14px;
    }

    .voice-wrap-place-top .voice-btn,
    .voice-wrap-between-scene-manual .voice-btn {
      width: 100%;
      max-width: none;
    }

    .voice-wrap-between-scene-manual {
      margin-top: 4px;
      margin-bottom: 16px;
    }

    @keyframes pulse {
      50% { box-shadow: 0 0 0 8px rgba(196, 92, 74, 0.25); }
    }

    .mic-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .status {
      min-height: 1.4em;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      margin: 0 0 18px;
    }

    .status.error {
      color: var(--danger);
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .list-head h2 {
      font-size: 0.95rem;
      font-weight: 600;
      margin: 0;
      color: var(--muted);
    }

    .list-hint {
      display: block;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      margin-top: 4px;
      opacity: 0.9;
    }

    .clear-done {
      min-height: 36px;
      padding: 0 12px;
      font-size: 0.8rem;
      border: 1px solid rgba(77, 182, 200, 0.45);
      border-radius: 10px;
      background: var(--surface);
      color: var(--accent-dark);
      touch-action: manipulation;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 56px;
      padding: 12px 14px;
      margin-bottom: 8px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .item:active {
      background: var(--accent-soft);
    }

    .check {
      width: 28px;
      height: 28px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .item.done .check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check svg {
      width: 16px;
      height: 16px;
      opacity: 0;
      color: #fff;
    }

    .item.done .check svg {
      opacity: 1;
    }

    .label {
      flex: 1;
      font-size: 1.05rem;
      line-height: 1.35;
      word-break: break-word;
    }

    .item.done .label {
      color: var(--done);
      text-decoration: line-through;
    }

    .item-edit {
      flex-shrink: 0;
      min-width: 48px;
      min-height: 44px;
      padding: 0 8px;
      margin: -8px -6px -8px 0;
      border: none;
      background: transparent;
      color: var(--accent-dark);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      border-radius: 10px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .item-edit:active {
      background: var(--accent-soft);
    }

    .empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .unsupported {
      background: #fff8e6;
      border: 1px solid #e8d4a0;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 0.88rem;
      color: #6b5a2a;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .unsupported code {
      font-size: 0.85em;
      padding: 0.1em 0.35em;
      background: rgba(0, 0, 0, 0.06);
      border-radius: 4px;
    }

    .unsupported a {
      color: var(--accent);
      font-weight: 600;
    }

    .manual-wrap {
      margin-top: 0;
      margin-bottom: 24px;
    }

    .manual-label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .manual-row {
      display: block;
    }

    .manual-input {
      width: 100%;
      min-height: var(--tap);
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #c8d4cc;
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .manual-input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .place-wrap {
      margin-bottom: 12px;
    }

    .place-input {
      width: 100%;
      min-height: var(--tap);
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #c8d4cc;
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .place-input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .place-section {
      margin-bottom: 22px;
    }

    .place-section:last-of-type {
      margin-bottom: 8px;
    }

    .place-heading-row {
      display: flex;
      align-items: stretch;
      gap: 4px;
      margin: 0 0 10px;
      padding: 4px 4px 10px 0;
      border-bottom: 2px solid #d0e5db;
      border-radius: 8px 8px 0 0;
    }

    .place-chevron-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      min-height: 48px;
      padding: 0 6px;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .place-chevron-btn:active {
      background: rgba(77, 182, 200, 0.12);
    }

    .place-title-btn {
      flex: 1;
      min-height: 48px;
      padding: 8px 8px 8px 4px;
      border: none;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
      text-align: left;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      word-break: break-word;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .place-title-btn:active {
      background: rgba(77, 182, 200, 0.08);
    }

    .place-chevron {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      color: inherit;
      transition: transform 0.2s ease;
    }

    .place-section.collapsed .place-chevron-btn .place-chevron {
      transform: rotate(-90deg);
    }

    .place-section.collapsed .place-items {
      display: none;
    }

    .place-section ul.place-items {
      margin: 0;
    }

    .edit-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.35);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }

    .edit-overlay[hidden] {
      display: none !important;
    }

    .edit-dialog {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .edit-dialog label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .edit-dialog input {
      width: 100%;
      min-height: var(--tap);
      padding: 12px 14px;
      font-size: 16px;
      border: 1px solid #c8d4cc;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    .edit-dialog input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .edit-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .edit-actions button {
      min-height: 44px;
      padding: 0 18px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .edit-cancel {
      border: 1px solid #c8d4cc;
      background: var(--surface);
      color: var(--muted);
    }

    .edit-save {
      border: none;
      background: var(--accent);
      color: #fff;
      box-shadow: var(--btn-shadow);
    }
  </style>
</head>
<body>
  <header>
    <h1>やりたいことリスト</h1>
  </header>

  <div id="unsupported" class="unsupported" hidden></div>

  <div class="voice-wrap voice-wrap-place-top">
    <button
      type="button"
      id="voiceBtnPlace"
      class="voice-btn voice-btn-with-caption"
      aria-pressed="false"
      aria-describedby="status"
      aria-label="シーン欄を音声で書き換えます。認識に失敗したら欄は元に戻ります。リストには自動では入りません。"
    >
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        <line x1="12" y1="19" x2="12" y2="23" />
        <line x1="8" y1="23" x2="16" y2="23" />
      </svg>
      <span class="voice-btn-textcol">
        <span id="voiceLabelPlace" class="voice-btn-title-line">音声で追加</span>
        <span class="voice-btn-caption" aria-hidden="true">シーン</span>
      </span>
    </button>
  </div>

  <div class="place-wrap">
    <label class="manual-label" for="placeInput">シーン</label>
    <input type="text" id="placeInput" class="place-input" placeholder="例：スーパー、ドラッグストア、100円均一" autocomplete="on" enterkeyhint="next" inputmode="text" />
  </div>

  <p id="status" class="status" role="status" aria-live="polite"></p>

  <div class="voice-wrap voice-wrap-between-scene-manual">
    <button
      type="button"
      id="voiceBtn2"
      class="voice-btn voice-btn-with-caption"
      aria-pressed="false"
      aria-describedby="status"
      aria-label="文字で追加欄を音声で書き換えます。リストに入れるには Enter を押してください。"
    >
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        <line x1="12" y1="19" x2="12" y2="23" />
        <line x1="8" y1="23" x2="16" y2="23" />
      </svg>
      <span class="voice-btn-textcol">
        <span id="voiceLabel2" class="voice-btn-title-line">買い物音声</span>
        <span class="voice-btn-caption" aria-hidden="true">文字で追加へ</span>
      </span>
    </button>
  </div>

  <div class="manual-wrap">
    <label class="manual-label" for="manualInput">文字で追加</label>
    <div class="manual-row">
      <input type="text" id="manualInput" class="manual-input" placeholder="例：牛乳、卵（読点「、」で複数）" autocomplete="off" enterkeyhint="done" inputmode="text" />
    </div>
  </div>

  <div class="list-head">
    <h2>リスト<span class="list-hint">（左の矢印で開閉・見出しタップで切り替え・項目の「編集」で文言変更）</span></h2>
    <button type="button" id="clearDone" class="clear-done" hidden>完了を削除</button>
  </div>
  <div id="listRoot" aria-label="やりたいことリスト（シーン別）"></div>
  <p id="empty" class="empty">まだありません。<br />マイクで欄を音声入力 → <strong>Enter</strong>でリストへ。またはキーボードで。</p>

  <div id="editOverlay" class="edit-overlay" hidden role="presentation">
    <div class="edit-dialog" role="dialog" aria-modal="true" aria-labelledby="editDialogLabel">
      <label id="editDialogLabel" for="editInput">項目を編集</label>
      <input type="text" id="editInput" autocomplete="off" enterkeyhint="done" />
      <div class="edit-actions">
        <button type="button" id="editCancel" class="edit-cancel">キャンセル</button>
        <button type="button" id="editSave" class="edit-save">保存</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = "voice-shopping-list-v1";
      var ACTIVE_PLACE_KEY = "voice-shopping-list-active-place";
      var COLLAPSED_KEY = "voice-shopping-collapsed-places-v1";
      /** 未分類の表示名（旧ラベルは読み込み時にここへ寄せる） */
      var UNSET_PLACE = "（やりたいこと・場所未設定）";
      var OLD_UNSET_PLACE = "（場所未設定）";
      var OLD_SCENE_UNSET = "（シーン未設定）";

      var collapsedPlaces = {};

      var voiceBtnPlace = document.getElementById("voiceBtnPlace");
      var voiceLabelPlace = document.getElementById("voiceLabelPlace");
      var voiceBtn2 = document.getElementById("voiceBtn2");
      var voiceLabel2 = document.getElementById("voiceLabel2");
      var statusEl = document.getElementById("status");
      var listRoot = document.getElementById("listRoot");
      var emptyEl = document.getElementById("empty");
      var clearDoneBtn = document.getElementById("clearDone");
      var unsupportedEl = document.getElementById("unsupported");
      var manualInput = document.getElementById("manualInput");
      var placeInput = document.getElementById("placeInput");
      var editOverlay = document.getElementById("editOverlay");
      var editInput = document.getElementById("editInput");
      var editCancel = document.getElementById("editCancel");
      var editSave = document.getElementById("editSave");

      function scrollListIntoViewSoft() {
        if (!listRoot) return;
        requestAnimationFrame(function () {
          try {
            listRoot.scrollIntoView({ behavior: "smooth", block: "nearest" });
          } catch (e0) {
            try {
              listRoot.scrollIntoView(true);
            } catch (e1) {}
          }
        });
      }

      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      var recognition = null;
      /** 次の認識結果を「やりたいことや場所」欄に入れるモード */
      var voiceCapturingPlace = false;
      /** 場所のタップ認識開始時に戻すための退避 */
      var pendingPlaceRestore = null;
      /** onend が先に来て pending が消えても、場所の書き換え元を onresult で使えるよう退避 */
      var sceneVoiceOldPlace = null;
      /** onend で voiceCapturingPlace が先に落ちても結果の扱いを固定する: scene-replace（タップ） */
      var voiceSessionIntent = null;
      /** メインマイクから「買う物を追加」で開始した認識か */
      var recognitionFromBottomBtn = false;
      /** 認識開始時点の場所（タップ時にスナップ） */
      var bottomVoiceAddPlaceSnap = "";
      var topSceneVoiceSession = false;
      /** iOS 等で onend が onresult より先に来るとき、場所取り込みが項目追加に化けないよう結果適用済みかを見る */
      var sceneVoiceReplaceCommitted = false;
      var sceneVoiceReplaceRestoreTimer = null;
      /** いま聞き取り中の「音声で追加」ボタン（押した側だけ listening 表示） */
      var voiceSessionBtn = null;
      var items = [];
      var statusClearTimer = null;
      var suppressToggleUntil = 0;
      /** iOS は微小な touchmove でキャンセルされやすいので、移動閾値と少し長めの待ちを使う */
      var longPressDelay = 620;
      var longPressMoveThresholdPx = 14;
      var editingItemId = null;

      function setStatus(text, isError, clearAfterMs) {
        if (statusClearTimer) {
          clearTimeout(statusClearTimer);
          statusClearTimer = null;
        }
        statusEl.textContent = text || "";
        statusEl.classList.toggle("error", !!isError);
        if (clearAfterMs && text && !isError) {
          statusClearTimer = setTimeout(function () {
            statusEl.textContent = "";
            statusEl.classList.remove("error");
            statusClearTimer = null;
          }, clearAfterMs);
        }
      }

      function normalizePlace(name) {
        var s = String(name || "").trim();
        if (!s || s === OLD_UNSET_PLACE || s === OLD_SCENE_UNSET) return UNSET_PLACE;
        return s;
      }

      function placeFromItem(i) {
        if (i.place && String(i.place).trim()) return String(i.place).trim();
        if (i.cat === "hyakuen") return "100円均一";
        if (i.cat === "drugstore") return "ドラッグストア";
        if (i.cat === "supermarket") return "スーパー";
        return UNSET_PLACE;
      }

      function load() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            var parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) {
              items = parsed.map(function (i) {
                return {
                  id: i.id,
                  text: i.text,
                  done: !!i.done,
                  place: normalizePlace(placeFromItem(i))
                };
              });
            } else items = [];
          } else items = [];
        } catch (e) {
          items = [];
        }
        try {
          var sp = localStorage.getItem(ACTIVE_PLACE_KEY);
          if (sp !== null) {
            placeInput.value = sp;
          }
        } catch (e2) {}
        loadCollapsed();
      }

      function loadCollapsed() {
        try {
          var cr = localStorage.getItem(COLLAPSED_KEY);
          if (cr) {
            var o = JSON.parse(cr);
            collapsedPlaces = o && typeof o === "object" ? o : {};
            if (
              collapsedPlaces[OLD_UNSET_PLACE] !== undefined &&
              collapsedPlaces[UNSET_PLACE] === undefined
            ) {
              collapsedPlaces[UNSET_PLACE] = collapsedPlaces[OLD_UNSET_PLACE];
              delete collapsedPlaces[OLD_UNSET_PLACE];
            }
            if (
              collapsedPlaces[OLD_SCENE_UNSET] !== undefined &&
              collapsedPlaces[UNSET_PLACE] === undefined
            ) {
              collapsedPlaces[UNSET_PLACE] = collapsedPlaces[OLD_SCENE_UNSET];
              delete collapsedPlaces[OLD_SCENE_UNSET];
            }
          } else collapsedPlaces = {};
        } catch (e3) {
          collapsedPlaces = {};
        }
      }

      function saveCollapsed() {
        try {
          localStorage.setItem(COLLAPSED_KEY, JSON.stringify(collapsedPlaces));
        } catch (e) {}
      }

      function save() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
          localStorage.setItem(ACTIVE_PLACE_KEY, placeInput.value);
        } catch (e) {}
      }

      function getActivePlace() {
        return placeInput.value.trim();
      }

      function migrateItemsPlace(oldP, newP) {
        oldP = String(oldP || "").trim();
        newP = String(newP || "").trim();
        if (!newP || !oldP || oldP === newP) return;
        items = items.map(function (i) {
          var ip = (i.place || "").trim();
          if (ip === oldP) return { id: i.id, text: i.text, done: i.done, place: newP };
          return i;
        });
        if (collapsedPlaces[oldP] !== undefined) {
          collapsedPlaces[newP] = collapsedPlaces[oldP];
          delete collapsedPlaces[oldP];
          saveCollapsed();
        }
      }

      function placesInOrder() {
        var seen = {};
        var order = [];
        items.forEach(function (i) {
          var p = (i.place || "").trim() || UNSET_PLACE;
          if (!seen[p]) {
            seen[p] = true;
            order.push(p);
          }
        });
        return order;
      }

      function splitPhrases(text) {
        return text
          .split(/[,、，]+|\s+と\s+/)
          .map(function (s) { return s.trim(); })
          .filter(Boolean);
      }

      function uid() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
      }

      function closeEditModal() {
        editOverlay.hidden = true;
        editingItemId = null;
        editInput.value = "";
      }

      function openEditItem(item) {
        editingItemId = item.id;
        editInput.value = item.text;
        editOverlay.hidden = false;
        editInput.focus();
        editInput.select();
      }

      function saveEditItem() {
        var t = editInput.value.trim();
        if (!t) {
          setStatus("内容を入力してください", true);
          editInput.focus();
          return;
        }
        items = items.map(function (i) {
          if (i.id === editingItemId) return { id: i.id, text: t, done: i.done, place: i.place };
          return i;
        });
        save();
        closeEditModal();
        render();
        setStatus("項目を更新しました", false, 2800);
      }

      function renderItemRow(item, ul) {
        var li = document.createElement("li");
        li.className = "item" + (item.done ? " done" : "");
        li.dataset.id = item.id;
        li.setAttribute("role", "group");
        li.setAttribute("aria-label", item.text);
        li.setAttribute("title", "タップで完了／右の編集で文言を変える");
        li.innerHTML =
          '<span class="check" aria-hidden="true">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>' +
          '<span class="label"></span>' +
          '<button type="button" class="item-edit" aria-label="この項目を編集">編集</button>';
        li.querySelector(".label").textContent = item.text;

        var editBtn = li.querySelector(".item-edit");
        editBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          openEditItem(item);
        });
        editBtn.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            e.stopPropagation();
            openEditItem(item);
          }
        });

        var pressTimer = null;
        var pressStartX = 0;
        var pressStartY = 0;
        function cancelPress() {
          if (pressTimer) {
            clearTimeout(pressTimer);
            pressTimer = null;
          }
        }
        function startPress() {
          cancelPress();
          pressTimer = setTimeout(function () {
            pressTimer = null;
            suppressToggleUntil = Date.now() + 700;
            openEditItem(item);
          }, longPressDelay);
        }

        li.addEventListener(
          "touchstart",
          function (e) {
            if (e.touches.length !== 1) return;
            pressStartX = e.touches[0].clientX;
            pressStartY = e.touches[0].clientY;
            startPress();
          },
          { passive: true }
        );
        li.addEventListener(
          "touchmove",
          function (e) {
            if (!pressTimer || e.touches.length !== 1) return;
            var x = e.touches[0].clientX;
            var y = e.touches[0].clientY;
            var dx = x - pressStartX;
            var dy = y - pressStartY;
            if (dx * dx + dy * dy > longPressMoveThresholdPx * longPressMoveThresholdPx) {
              cancelPress();
            }
          },
          { passive: true }
        );
        li.addEventListener("touchend", cancelPress);
        li.addEventListener("touchcancel", cancelPress);

        li.addEventListener("contextmenu", function (e) {
          e.preventDefault();
          cancelPress();
          suppressToggleUntil = Date.now() + 700;
          openEditItem(item);
        });

        li.addEventListener("mousedown", function (e) {
          if (e.button !== 0) return;
          startPress();
        });
        li.addEventListener("mouseup", cancelPress);
        li.addEventListener("mouseleave", cancelPress);

        li.addEventListener("click", function (e) {
          if (Date.now() < suppressToggleUntil) {
            e.preventDefault();
            e.stopPropagation();
            return;
          }
          toggle(item.id);
        });
        ul.appendChild(li);
      }

      function render() {
        listRoot.innerHTML = "";
        var hasDone = false;
        items.forEach(function (item) {
          if (item.done) hasDone = true;
        });

        placesInOrder().forEach(function (placeName) {
          var inPlace = items.filter(function (i) {
            var p = (i.place || "").trim() || UNSET_PLACE;
            return p === placeName;
          });
          var isCollapsed = !!collapsedPlaces[placeName];
          var section = document.createElement("section");
          section.className = "place-section" + (isCollapsed ? " collapsed" : "");

          var ulId = "items-" + encodeURIComponent(placeName).replace(/%/g, "");

          var headRow = document.createElement("div");
          headRow.className = "place-heading-row";

          var chevronBtn = document.createElement("button");
          chevronBtn.type = "button";
          chevronBtn.className = "place-chevron-btn";
          chevronBtn.setAttribute("aria-expanded", isCollapsed ? "false" : "true");
          chevronBtn.setAttribute("aria-controls", ulId);
          chevronBtn.setAttribute(
            "aria-label",
            isCollapsed ? "「" + placeName + "」の項目を開く" : "「" + placeName + "」の項目を閉じる"
          );

          var chev = document.createElement("span");
          chev.className = "place-chevron";
          chev.setAttribute("aria-hidden", "true");
          chev.innerHTML =
            '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<polyline points="6 9 12 15 18 9"/></svg>';
          chevronBtn.appendChild(chev);

          chevronBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            collapsedPlaces[placeName] = !collapsedPlaces[placeName];
            saveCollapsed();
            render();
          });

          var titleBtn = document.createElement("button");
          titleBtn.type = "button";
          titleBtn.className = "place-title-btn";
          titleBtn.textContent = placeName;
          titleBtn.setAttribute(
            "aria-label",
            "シーンを「" + placeName + "」に切り替え"
          );
          titleBtn.addEventListener("click", function () {
            placeInput.value = placeName;
            try {
              localStorage.setItem(ACTIVE_PLACE_KEY, placeInput.value);
            } catch (err) {}
            setStatus("「" + placeName + "」に切り替えました", false, 3200);
          });

          headRow.appendChild(chevronBtn);
          headRow.appendChild(titleBtn);

          var ul = document.createElement("ul");
          ul.className = "place-items";
          ul.id = ulId;
          inPlace.forEach(function (item) {
            renderItemRow(item, ul);
          });

          section.appendChild(headRow);
          section.appendChild(ul);
          listRoot.appendChild(section);
        });

        emptyEl.hidden = items.length > 0;
        clearDoneBtn.hidden = !hasDone;
      }

      function toggle(id) {
        items = items.map(function (i) {
          if (i.id === id) return { id: i.id, text: i.text, done: !i.done, place: i.place };
          return i;
        });
        save();
        render();
      }

      function ensurePlaceForAdd() {
        var place = getActivePlace();
        if (!place) {
          setStatus("「シーン」を先に入力してください", true);
          placeInput.focus();
          return "";
        }
        return place;
      }

      function addFromText(text, explicitPlace) {
        var place;
        if (arguments.length >= 2 && explicitPlace !== undefined) {
          place = explicitPlace;
        } else {
          place = ensurePlaceForAdd();
          if (!place) return;
        }
        var parts = splitPhrases(text);
        if (parts.length === 0) return;
        parts.forEach(function (p) {
          items.push({ id: uid(), text: p, done: false, place: place });
        });
        save();
        render();
        scrollListIntoViewSoft();
        setStatus("「" + place + "」に" + parts.length + "件追加しました", false, 3200);
        manualInput.value = "";
      }

      function submitManual() {
        var t = manualInput.value.trim();
        if (!t) {
          setStatus("内容を入力してください", true);
          return;
        }
        addFromText(t);
      }

      function setListening(on) {
        if (!on) {
          voiceBtnPlace.classList.remove("listening");
          voiceBtn2.classList.remove("listening");
          voiceBtnPlace.setAttribute("aria-pressed", "false");
          voiceBtn2.setAttribute("aria-pressed", "false");
          voiceLabelPlace.textContent = "音声で追加";
          voiceLabel2.textContent = "買い物音声";
          voiceSessionBtn = null;
          return;
        }
        var b = voiceSessionBtn;
        if (!b) return;
        voiceBtnPlace.classList.toggle("listening", b === voiceBtnPlace);
        voiceBtn2.classList.toggle("listening", b === voiceBtn2);
        voiceBtnPlace.setAttribute("aria-pressed", b === voiceBtnPlace ? "true" : "false");
        voiceBtn2.setAttribute("aria-pressed", b === voiceBtn2 ? "true" : "false");
        var lab = "聞いています…（タップで停止）";
        voiceLabelPlace.textContent = b === voiceBtnPlace ? lab : "音声で追加";
        voiceLabel2.textContent = b === voiceBtn2 ? lab : "買い物音声";
      }

      function initRecognition() {
        if (!SpeechRecognition) return false;
        recognition = new SpeechRecognition();
        recognition.lang = "ja-JP";
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = function () {
          setListening(true);
          if (recognitionFromBottomBtn) {
            setStatus("買う物を話してください（「文字で追加」欄に入ります。リストへは Enter）", false);
          } else if (voiceSessionIntent === "scene-replace" || voiceCapturingPlace) {
            setStatus("「シーン」を話してください", false);
          } else {
            var p = getActivePlace();
            setStatus(p ? "「" + p + "」に入れる内容を話してください" : "話してください", false);
          }
        };

        recognition.onend = function () {
          var wasTopSceneReplace =
            topSceneVoiceSession && pendingPlaceRestore !== null;
          var savedRestore = pendingPlaceRestore;

          topSceneVoiceSession = false;
          pendingPlaceRestore = null;

          if (wasTopSceneReplace) {
            setListening(false);
            if (sceneVoiceReplaceRestoreTimer) {
              clearTimeout(sceneVoiceReplaceRestoreTimer);
              sceneVoiceReplaceRestoreTimer = null;
            }
            sceneVoiceReplaceRestoreTimer = setTimeout(function () {
              sceneVoiceReplaceRestoreTimer = null;
              if (!sceneVoiceReplaceCommitted) {
                placeInput.value = savedRestore;
                try {
                  localStorage.setItem(ACTIVE_PLACE_KEY, placeInput.value);
                } catch (e0) {}
              }
              sceneVoiceReplaceCommitted = false;
              voiceCapturingPlace = false;
              sceneVoiceOldPlace = null;
              voiceSessionIntent = null;
              recognitionFromBottomBtn = false;
              bottomVoiceAddPlaceSnap = "";
            }, 280);
          } else {
            voiceCapturingPlace = false;
            setListening(false);
          }
        };

        recognition.onerror = function (e) {
          recognitionFromBottomBtn = false;
          bottomVoiceAddPlaceSnap = "";
          setListening(false);
          if (e.error === "not-allowed" || e.error === "service-not-allowed") {
            setStatus("マイクの許可が必要です。ブラウザの設定を確認してください。", true);
          } else if (e.error === "no-speech") {
            setStatus(
              "声が聞き取れませんでした。マイク許可・入力デバイス・ミュート解除を確認し、もう一度お試しください。（Mac は Chrome や入力音量が効くことがあります）",
              true
            );
          } else if (e.error === "aborted") {
            setStatus("", false);
          } else {
            setStatus("音声認識エラー: " + e.error, true);
          }
        };

        recognition.onresult = function (e) {
          var transcript = "";
          for (var i = e.resultIndex; i < e.results.length; i++) {
            transcript += e.results[i][0].transcript;
          }
          transcript = transcript.trim();
          if (!transcript) {
            recognitionFromBottomBtn = false;
            bottomVoiceAddPlaceSnap = "";
            setStatus("内容が空でした", true);
            return;
          }
          var ttrim = transcript.trim();

          if (recognitionFromBottomBtn) {
            recognitionFromBottomBtn = false;
            bottomVoiceAddPlaceSnap = "";
            voiceSessionIntent = null;
            sceneVoiceOldPlace = null;
            voiceCapturingPlace = false;
            pendingPlaceRestore = null;
            topSceneVoiceSession = false;
            sceneVoiceReplaceCommitted = true;
            manualInput.value = ttrim;
            setStatus(
              "「文字で追加」に入れました。リストへ追加するには Enter を押してください。",
              false,
              4200
            );
            return;
          }

          var intent = voiceSessionIntent;

          if (intent === "scene-replace") {
            sceneVoiceReplaceCommitted = true;
            var renameFrom =
              sceneVoiceOldPlace !== null && sceneVoiceOldPlace !== undefined
                ? String(sceneVoiceOldPlace).trim()
                : "";
            sceneVoiceOldPlace = null;
            voiceSessionIntent = null;
            voiceCapturingPlace = false;
            pendingPlaceRestore = null;
            topSceneVoiceSession = false;
            placeInput.value = ttrim;
            try {
              localStorage.setItem(ACTIVE_PLACE_KEY, placeInput.value);
            } catch (err) {}
            if (renameFrom) {
              migrateItemsPlace(renameFrom, ttrim);
            }
            save();
            render();
            scrollListIntoViewSoft();
            if (renameFrom) {
              setStatus(
                "「" + renameFrom + "」を「" + ttrim + "」に書き換えました（下のリストのまとまりも移しました）。",
                false,
                4200
              );
            } else {
              setStatus(
                "「" + ttrim + "」をシーン欄に入れました。買う物は「文字で追加」に入力し、Enter でリストへ。",
                false,
                4200
              );
            }
            return;
          }

          if (voiceCapturingPlace) {
            sceneVoiceReplaceCommitted = true;
            var rf =
              sceneVoiceOldPlace !== null && sceneVoiceOldPlace !== undefined
                ? String(sceneVoiceOldPlace).trim()
                : "";
            sceneVoiceOldPlace = null;
            voiceCapturingPlace = false;
            pendingPlaceRestore = null;
            topSceneVoiceSession = false;
            placeInput.value = ttrim;
            try {
              localStorage.setItem(ACTIVE_PLACE_KEY, placeInput.value);
            } catch (err3) {}
            if (rf) {
              migrateItemsPlace(rf, ttrim);
            }
            save();
            render();
            scrollListIntoViewSoft();
            if (rf) {
              setStatus(
                "「" + rf + "」を「" + ttrim + "」に書き換えました（下のリストのまとまりも移しました）。",
                false,
                4200
              );
            } else {
              setStatus(
                "「" + ttrim + "」をシーン欄に入れました。買う物は「文字で追加」に入力し、Enter でリストへ。",
                false,
                4200
              );
            }
            return;
          }

          manualInput.value = ttrim;
          setStatus(
            "「文字で追加」に入れました。リストへは Enter で追加できます。",
            false,
            3200
          );
        };

        return true;
      }

      function stopAnyVoiceListening() {
        var anyListening =
          voiceBtnPlace.classList.contains("listening") ||
          voiceBtn2.classList.contains("listening");
        if (anyListening) {
          if (recognition) {
            try { recognition.stop(); } catch (err) {}
            setStatus("停止しました", false, 2200);
          }
          setListening(false);
          return true;
        }
        return false;
      }

      /** シーン欄を音声で上書き（認識完了時に反映。失敗時は復元）。sessionBtn は listening 表示用 */
      function startSceneVoiceReplaceSession(sessionBtn) {
        if (sceneVoiceReplaceRestoreTimer) {
          clearTimeout(sceneVoiceReplaceRestoreTimer);
          sceneVoiceReplaceRestoreTimer = null;
        }
        recognitionFromBottomBtn = false;
        bottomVoiceAddPlaceSnap = "";
        sceneVoiceReplaceCommitted = false;
        sceneVoiceOldPlace = placeInput.value;
        voiceSessionIntent = "scene-replace";
        topSceneVoiceSession = true;
        pendingPlaceRestore = placeInput.value;
        try {
          placeInput.blur();
        } catch (eBlur) {}
        voiceCapturingPlace = true;
        setStatus("新しい「シーン」を話してください（認識後にシーン欄が書き換わります）", false);
        voiceSessionBtn = sessionBtn;
        try {
          recognition.start();
        } catch (err) {
          var salvaged = pendingPlaceRestore;
          pendingPlaceRestore = null;
          topSceneVoiceSession = false;
          voiceCapturingPlace = false;
          sceneVoiceOldPlace = null;
          voiceSessionIntent = null;
          recognitionFromBottomBtn = false;
          bottomVoiceAddPlaceSnap = "";
          voiceSessionBtn = null;
          if (salvaged !== null && salvaged !== undefined) {
            placeInput.value = salvaged;
            try {
              localStorage.setItem(ACTIVE_PLACE_KEY, placeInput.value);
            } catch (e2) {}
          }
          setListening(false);
          setStatus("もう一度タップしてください", true);
        }
      }

      /** 上のマイク: シーンだけ音声で入れ替え（「文字で追加」は触らない） */
      function handleVoiceClickPlace() {
        if (stopAnyVoiceListening()) return;
        if (!recognition) {
          setStatus(
            "このブラウザでは音声は使えません。「シーン」はキーボードで入力できます。",
            true
          );
          return;
        }
        startSceneVoiceReplaceSession(voiceBtnPlace);
      }

      /** 買い物音声: 「文字で追加」を認識結果で上書きするだけ（リストへは Enter） */
      function handleVoiceClickTop() {
        if (stopAnyVoiceListening()) return;
        if (!recognition) {
          setStatus(
            "このブラウザでは音声は使えません。「文字で追加」にキーボードで入れてから追加できます。",
            true
          );
          return;
        }
        if (sceneVoiceReplaceRestoreTimer) {
          clearTimeout(sceneVoiceReplaceRestoreTimer);
          sceneVoiceReplaceRestoreTimer = null;
        }
        sceneVoiceReplaceCommitted = false;
        topSceneVoiceSession = false;
        pendingPlaceRestore = null;
        voiceCapturingPlace = false;
        voiceSessionIntent = null;
        sceneVoiceOldPlace = null;
        voiceSessionBtn = voiceBtn2;
        recognitionFromBottomBtn = true;
        bottomVoiceAddPlaceSnap = "";
        try {
          recognition.start();
        } catch (err) {
          recognitionFromBottomBtn = false;
          bottomVoiceAddPlaceSnap = "";
          voiceSessionBtn = null;
          setListening(false);
          setStatus("もう一度タップしてください", true);
        }
      }

      voiceBtnPlace.addEventListener("click", function () {
        handleVoiceClickPlace();
      });

      voiceBtn2.addEventListener("click", function () {
        handleVoiceClickTop();
      });

      clearDoneBtn.addEventListener("click", function () {
        items = items.filter(function (i) { return !i.done; });
        save();
        render();
        setStatus("完了した項目を削除しました", false, 2800);
      });

      manualInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          submitManual();
        }
      });

      placeInput.addEventListener("blur", function () {
        try {
          localStorage.setItem(ACTIVE_PLACE_KEY, placeInput.value);
        } catch (e) {}
      });

      editCancel.addEventListener("click", function () {
        closeEditModal();
      });
      editSave.addEventListener("click", function () {
        saveEditItem();
      });
      editOverlay.addEventListener("click", function (e) {
        if (e.target === editOverlay) closeEditModal();
      });
      editInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          saveEditItem();
        }
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && !editOverlay.hidden) {
          e.preventDefault();
          closeEditModal();
        }
      });

      load();
      render();

      if (!initRecognition()) {
        unsupportedEl.hidden = false;
        unsupportedEl.innerHTML =
          "<strong>音声が使えない理由（iPhone でよくある）</strong><br />" +
          "家の Wi-Fi の <code>http://192.168…</code> のように開いていると、ブラウザが「安全なページ」とみなさず、マイク・音声認識が無効になります。<br /><br />" +
          "<strong>今すぐ使う：</strong> キーボードで「シーン」「文字で追加」に入力し、<strong>Enter</strong>でリストへ。音声が使える環境ではマイクで欄を書き換えられます（自動ではリストに入りません）。<br /><br />" +
          "<strong>音声も試す：</strong> Mac で <a href=\"https://ngrok.com/\" target=\"_blank\" rel=\"noopener\">ngrok</a> などで HTTPS の URL を作り、その URL を iPhone で開くと、環境によっては音声が使えることがあります。Android の Chrome では、同じ Wi-Fi の <code>http://…</code> でも音声が動くことが多いです。";
        voiceLabelPlace.textContent = "音声で追加";
        voiceLabel2.textContent = "買い物音声";
      }
    })();
  </script>
</body>
</html>
